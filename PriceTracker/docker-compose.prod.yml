services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: pricetracker_meta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pricetracker_meta_db"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
    restart: unless-stopped

  user-service:
    build: { context: ., dockerfile: user-service/Dockerfile }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  product-catalog-service:
    build: { context: ., dockerfile: product-catalog-service/Dockerfile }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx400m"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      elasticsearch: { condition: service_started }
    restart: unless-stopped

  scraper-service:
    build: { context: ., dockerfile: scraper-service/Dockerfile }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx300m"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    restart: unless-stopped

  notification-service:
    build: { context: ., dockerfile: notification-service/Dockerfile }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    restart: unless-stopped

  bff:
    build: { context: ., dockerfile: bff/Dockerfile }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on: [user-service, product-catalog-service, scraper-service, notification-service]
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    depends_on: [bff]
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
