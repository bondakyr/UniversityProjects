spring.application.name=product-catalog-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/pricetracker_catalog_db
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration-ms=86400000

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=price-catalog-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=cz.cvut.fel.nss.productcatalogservice.dto.kafka.PriceUpdateEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.elasticsearch.uris=http://localhost:9200

services.internal.token=pt-internal-secret-2026

catalog.price-retention-days=1095
catalog.price-retention-cron=0 15 3 * * *
